name: FairEval Release Gate

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  eval-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest typer

      - name: Run tests
        run: |
          pytest -q

      - name: Run baseline eval
        run: |
          python -m evals.cli run --suite rag_basic --model mock --out-dir baseline_artifacts

      - name: Capture baseline run id
        run: |
          BASELINE_ID=$(ls baseline_artifacts/reports/*.json | head -n 1 | xargs -n 1 basename | sed 's/.json//')
          echo "BASELINE_ID=$BASELINE_ID" >> $GITHUB_ENV

      - name: Run candidate eval
        run: |
          python -m evals.cli run --suite rag_basic --model mock --out-dir candidate_artifacts

      - name: Capture candidate run id
        run: |
          CANDIDATE_ID=$(ls candidate_artifacts/reports/*.json | head -n 1 | xargs -n 1 basename | sed 's/.json//')
          echo "CANDIDATE_ID=$CANDIDATE_ID" >> $GITHUB_ENV

      - name: Copy reports into one directory
        run: |
          mkdir -p reports
          cp baseline_artifacts/reports/*.json reports/
          cp candidate_artifacts/reports/*.json reports/

      - name: Compare runs
        run: |
          python -m evals.cli compare \
            --baseline "$BASELINE_ID" \
            --candidate "$CANDIDATE_ID" \
            --reports-dir ./reports \
            --out-dir .

      - name: Apply release gate
        run: |
          COMPARE_FILE=$(ls compare/*.json | head -n 1)
          python -m evals.cli gate \
            --compare-artifact "$COMPARE_FILE" \
            --max-avg-score-drop 0.05 \
            --max-pass-rate-drop 0.10 \
            --out-dir .