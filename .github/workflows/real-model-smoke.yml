name: Real Model Smoke Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - refactor/fair-eval-release-gate
      - feat/faireval-distilbert-real-model
  pull_request:
    branches:
      - main

jobs:
  distilbert-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest -q

      - name: Run real-model evaluation
        run: |
          python -m evals.cli run \
            --suite classification_basic \
            --model distilbert-sst2 \
            --out-dir real_model_artifacts

      - name: Show generated artifacts
        run: |
          ls -R real_model_artifacts
          REPORT_ID=$(ls real_model_artifacts/reports/*.json | head -n 1)
          echo "REPORT_ID=$REPORT_ID"
          sed -n '1,240p' "$REPORT_ID"
