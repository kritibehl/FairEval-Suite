apiVersion: apps/v1
kind: Deployment
metadata:
  name: faireval-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: faireval-api
  template:
    metadata:
      labels:
        app: faireval-api
    spec:
      containers:
        - name: faireval-api
          image: faireval-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8010
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8010
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8010
---
apiVersion: v1
kind: Service
metadata:
  name: faireval-api
spec:
  selector:
    app: faireval-api
  ports:
    - port: 80
      targetPort: 8010
